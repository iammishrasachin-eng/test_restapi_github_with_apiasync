name: Build and Deploy to VM

on:
  workflow_dispatch:

env:
  PROJECT_PATH: test_restapi_with_APISyncWithGithub/test_restapi_with_APISyncWithGithub.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone code from Bitbucket
        run: |
          git clone https://x-token-auth:${{ secrets.BITBUCKET_TOKEN }}@bitbucket.org/iammishrasachin_workspace/test_restapi_with_apisync.git src

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish "src/${{ env.PROJECT_PATH }}" -c Release -o ./publish

      - name: Zip artifact and prep deploy script
        run: |
          cd publish && zip -r ../app.zip . && cd ..
          cp src/deploy.ps1 ./deploy.ps1

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_SSH_PORT }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "app.zip,deploy.ps1"
          target: "C:/temp"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_SSH_PORT }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: powershell -ExecutionPolicy Bypass -File C:\temp\deploy.ps1
