name: Build and Deploy to VM

on:
  workflow_dispatch:

env:
  PROJECT_PATH: test_restapi_with_APISyncWithGithub/test_restapi_with_APISyncWithGithub.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -o ./publish

      - name: Zip artifact
        run: cd publish && zip -r ../app.zip . && cd ..

      # zip aur deploy.ps1 dono VM par bhejo (SCP cmd shell se chalega)
      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_SSH_PORT }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "app.zip,deploy.ps1"
          target: "C:/temp"

      # cmd default shell se PowerShell script ko -File se chalao (koi escaping nahi)
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_SSH_PORT }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: powershell -ExecutionPolicy Bypass -File C:\temp\deploy.ps1